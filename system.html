<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Daily System</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Zen+Kaku+Gothic+New:wght@400;700&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0f0f13;
    --surface: #1a1a22;
    --surface2: #22222e;
    --border: #2e2e3e;
    --accent: #7c6af7;
    --accent2: #4fc3f7;
    --accent3: #81c784;
    --warn: #ffb74d;
    --text: #e8e8f0;
    --muted: #7070a0;
    --red: #ef5350;
    --radius: 10px;
    --font: 'Zen Kaku Gothic New', sans-serif;
    --mono: 'JetBrains Mono', monospace;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: var(--bg); color: var(--text); font-family: var(--font); font-size: 14px; line-height: 1.6; }
  h2 { font-size: 12px; font-weight: 700; letter-spacing: .08em; color: var(--muted); text-transform: uppercase; margin-bottom: 10px; }
  h3 { font-size: 15px; font-weight: 700; margin-bottom: 4px; }
  input, textarea, select { background: var(--bg); border: 1px solid var(--border); border-radius: 6px; color: var(--text); font-family: var(--font); font-size: 13px; padding: 6px 10px; outline: none; width: 100%; }
  input:focus, textarea:focus { border-color: var(--accent); }
  textarea { resize: vertical; }
  button { cursor: pointer; border: none; border-radius: 6px; font-family: var(--font); font-size: 13px; font-weight: 700; padding: 7px 14px; transition: opacity .15s; }
  button:hover { opacity: .8; }
  .btn-primary { background: var(--accent); color: #fff; }
  .btn-ghost { background: var(--surface2); color: var(--text); }
  .btn-danger { background: transparent; color: var(--red); border: 1px solid var(--red); }
  .btn-sm { padding: 3px 9px; font-size: 12px; }
  .chip { display: inline-block; padding: 3px 10px; border-radius: 20px; font-size: 12px; font-weight: 700; cursor: pointer; border: 1.5px solid var(--border); color: var(--muted); }
  .chip.active { border-color: var(--accent); color: var(--accent); background: rgba(124,106,247,.12); }

  .layout { display: grid; grid-template-columns: 280px 1fr; gap: 14px; padding: 14px; min-height: 100vh; }
  .panel { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 14px; }

  /* Header */
  .header { grid-column: 1/-1; display: flex; align-items: center; gap: 16px; padding: 12px 18px; background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); }
  .header .date { font-family: var(--mono); font-size: 18px; font-weight: 700; color: var(--accent2); }
  .header .clock { font-family: var(--mono); font-size: 22px; font-weight: 700; }
  .header .spacer { flex: 1; }
  .sync-status { font-size: 11px; font-family: var(--mono); color: var(--muted); }
  .sync-status.syncing { color: var(--warn); }
  .sync-status.ok { color: var(--accent3); }
  .sync-status.err { color: var(--red); }

  /* Left */
  .left { display: flex; flex-direction: column; gap: 14px; }

  /* Streaks */
  .streak-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
  .streak-card { background: var(--surface2); border-radius: 8px; padding: 10px; text-align: center; }
  .streak-card .s-label { font-size: 11px; color: var(--muted); }
  .streak-card .s-count { font-family: var(--mono); font-size: 26px; font-weight: 700; color: var(--accent); line-height: 1.2; }
  .streak-card .s-unit { font-size: 10px; color: var(--muted); }
  .streak-btns { display: flex; gap: 6px; margin-top: 10px; flex-wrap: wrap; }

  /* Goals */
  .goal-card { background: var(--surface2); border-radius: 8px; padding: 12px; margin-bottom: 8px; }
  .goal-card:last-child { margin-bottom: 0; }
  .goal-header { display: flex; align-items: center; gap: 8px; margin-bottom: 8px; }
  .goal-tabs { display: flex; gap: 4px; margin-bottom: 8px; }
  .goal-tab { font-size: 11px; padding: 2px 8px; border-radius: 20px; cursor: pointer; border: 1.5px solid var(--border); color: var(--muted); }
  .goal-tab.active { border-color: var(--accent2); color: var(--accent2); background: rgba(79,195,247,.1); }
  .goal-content { font-size: 13px; min-height: 32px; color: var(--text); }
  .goal-edit { display: none; margin-top: 8px; }
  .goal-edit.open { display: block; }
  .goal-edit textarea { font-size: 12px; min-height: 50px; margin-top: 4px; }
  .goal-edit label { font-size: 11px; color: var(--muted); display: block; margin-top: 8px; }

  /* Middle */
  .middle { display: flex; flex-direction: column; gap: 14px; }

  /* Schedule */
  .time-slot { display: flex; align-items: center; gap: 8px; margin-bottom: 4px; min-height: 36px; }
  .time-label { font-family: var(--mono); font-size: 12px; color: var(--muted); width: 44px; flex-shrink: 0; }
  .time-block { flex: 1; background: var(--surface2); border-radius: 6px; padding: 6px 10px; font-size: 13px; display: flex; align-items: center; gap: 8px; border-left: 3px solid transparent; }
  .time-block.current { border-left-color: var(--accent) !important; }
  .study-chips { display: flex; gap: 4px; margin-left: auto; }

  /* Tasks */
  .task-item { background: var(--surface2); border-radius: 10px; padding: 12px; margin-bottom: 8px; }
  .task-item:last-child { margin-bottom: 0; }
  .task-header { display: flex; align-items: center; gap: 8px; }
  .task-check { width: 20px; height: 20px; border-radius: 5px; border: 2px solid var(--border); cursor: pointer; flex-shrink: 0; display: flex; align-items: center; justify-content: center; transition: all .15s; }
  .task-check.done { background: var(--accent3); border-color: var(--accent3); }
  .task-check.done::after { content: '✓'; color: #fff; font-size: 13px; font-weight: 700; }
  .task-name { font-size: 14px; font-weight: 700; flex: 1; }
  .task-name.done { text-decoration: line-through; color: var(--muted); }
  .task-name-input { font-weight: 700; font-size: 14px; flex: 1; }
  .task-actions { display: flex; gap: 4px; flex-shrink: 0; }

  /* Comments */
  .task-comments { margin-top: 10px; display: none; }
  .task-comments.open { display: block; }
  .comment-item { display: flex; gap: 8px; align-items: flex-start; margin-bottom: 6px; background: var(--bg); border-radius: 6px; padding: 8px 10px; }
  .comment-meta { font-size: 10px; color: var(--muted); font-family: var(--mono); flex-shrink: 0; padding-top: 2px; }
  .comment-text { flex: 1; font-size: 13px; line-height: 1.5; white-space: pre-wrap; word-break: break-word; }
  .comment-text.editing { display: none; }
  .comment-edit-area { flex: 1; display: none; }
  .comment-edit-area.editing { display: block; }
  .comment-edit-area textarea { min-height: 48px; font-size: 13px; }
  .comment-edit-btns { display: flex; gap: 4px; margin-top: 4px; }
  .comment-del { flex-shrink: 0; background: none; border: none; color: var(--muted); font-size: 14px; cursor: pointer; padding: 0 4px; line-height: 1; }
  .comment-del:hover { color: var(--red); }
  .comment-edit-btn { flex-shrink: 0; background: none; border: none; color: var(--muted); font-size: 13px; cursor: pointer; padding: 0 4px; line-height: 1; }
  .comment-edit-btn:hover { color: var(--accent2); }
  .add-comment-row { display: flex; gap: 6px; margin-top: 6px; }
  .add-comment-row textarea { flex: 1; min-height: 36px; font-size: 12px; }

  /* Add task */
  .add-task-row { display: flex; gap: 8px; margin-top: 10px; }

  /* AI Review */
  .review-panel { background: linear-gradient(135deg, rgba(124,106,247,.07), rgba(79,195,247,.04)); border: 1px solid rgba(124,106,247,.25); border-radius: var(--radius); padding: 14px; }
  .review-content { font-size: 13px; white-space: pre-wrap; line-height: 1.75; max-height: 160px; overflow-y: auto; color: var(--text); }
</style>
</head>
<body>
<div class="layout">

<!-- HEADER -->
<div class="header">
  <div class="date" id="headerDate"></div>
  <div class="clock" id="headerClock">--:--:--</div>
  <div class="spacer"></div>
  <button class="btn-ghost btn-sm" onclick="pullGist()">↓ Pull</button>
  <button class="btn-ghost btn-sm" onclick="pushGist()">↑ Push</button>
  <span class="sync-status" id="syncStatus">● 未同期</span>
</div>

<!-- LEFT -->
<div class="left">

  <!-- Streaks -->
  <div class="panel">
    <h2>Streak</h2>
    <div class="streak-grid">
      <div class="streak-card"><div class="s-label">Study</div><div class="s-count" id="st-study">0</div><div class="s-unit">days</div></div>
      <div class="streak-card"><div class="s-label">Vega</div><div class="s-count" id="st-vega">0</div><div class="s-unit">days</div></div>
      <div class="streak-card"><div class="s-label">Video</div><div class="s-count" id="st-video">0</div><div class="s-unit">days</div></div>
      <div class="streak-card"><div class="s-label">Pot</div><div class="s-count" id="st-pot">0</div><div class="s-unit">days</div></div>
    </div>
    <div class="streak-btns">
      <button class="btn-ghost btn-sm" onclick="addStreak('study')">+Study</button>
      <button class="btn-ghost btn-sm" onclick="addStreak('vega')">+Vega</button>
      <button class="btn-ghost btn-sm" onclick="addStreak('video')">+Video</button>
      <button class="btn-ghost btn-sm" onclick="addStreak('pot')">+Pot</button>
    </div>
  </div>

  <!-- Goals -->
  <div class="panel" style="flex:1;overflow-y:auto;">
    <h2>Goals</h2>

    <div class="goal-card">
      <div class="goal-header">
        <span style="font-size:18px">🎮</span>
        <h3>ベガ 1000戦</h3>
        <button class="btn-ghost btn-sm" style="margin-left:auto" onclick="toggleGoalEdit('vega')">編集</button>
      </div>
      <div class="goal-tabs">
        <div class="goal-tab active" onclick="switchGoalTab('vega','long',this)">長期</div>
        <div class="goal-tab" onclick="switchGoalTab('vega','mid',this)">中期</div>
        <div class="goal-tab" onclick="switchGoalTab('vega','short',this)">短期</div>
      </div>
      <div class="goal-content" id="goal-vega-text">-</div>
      <div class="goal-edit" id="goal-vega-edit">
        <label>長期</label><textarea id="gv-long" oninput="saveGoal('vega')"></textarea>
        <label>中期</label><textarea id="gv-mid" oninput="saveGoal('vega')"></textarea>
        <label>短期</label><textarea id="gv-short" oninput="saveGoal('vega')"></textarea>
      </div>
    </div>

    <div class="goal-card">
      <div class="goal-header">
        <span style="font-size:18px">🎬</span>
        <h3>動画一本</h3>
        <button class="btn-ghost btn-sm" style="margin-left:auto" onclick="toggleGoalEdit('video')">編集</button>
      </div>
      <div class="goal-tabs">
        <div class="goal-tab active" onclick="switchGoalTab('video','long',this)">長期</div>
        <div class="goal-tab" onclick="switchGoalTab('video','mid',this)">中期</div>
        <div class="goal-tab" onclick="switchGoalTab('video','short',this)">短期</div>
      </div>
      <div class="goal-content" id="goal-video-text">-</div>
      <div class="goal-edit" id="goal-video-edit">
        <label>長期</label><textarea id="gvid-long" oninput="saveGoal('video')"></textarea>
        <label>中期</label><textarea id="gvid-mid" oninput="saveGoal('video')"></textarea>
        <label>短期</label><textarea id="gvid-short" oninput="saveGoal('video')"></textarea>
      </div>
    </div>

    <div class="goal-card">
      <div class="goal-header">
        <span style="font-size:18px">🪴</span>
        <h3>ポット販売</h3>
        <button class="btn-ghost btn-sm" style="margin-left:auto" onclick="toggleGoalEdit('pot')">編集</button>
      </div>
      <div class="goal-tabs">
        <div class="goal-tab active" onclick="switchGoalTab('pot','long',this)">長期</div>
        <div class="goal-tab" onclick="switchGoalTab('pot','mid',this)">中期</div>
        <div class="goal-tab" onclick="switchGoalTab('pot','short',this)">短期</div>
      </div>
      <div class="goal-content" id="goal-pot-text">-</div>
      <div class="goal-edit" id="goal-pot-edit">
        <label>長期</label><textarea id="gp-long" oninput="saveGoal('pot')"></textarea>
        <label>中期</label><textarea id="gp-mid" oninput="saveGoal('pot')"></textarea>
        <label>短期</label><textarea id="gp-short" oninput="saveGoal('pot')"></textarea>
      </div>
    </div>
  </div>
</div>

<!-- MIDDLE -->
<div class="middle">

  <!-- AI Review -->
  <div class="review-panel">
    <h2>🤖 AI Review</h2>
    <div class="review-content" id="aiReview">まだレビューがありません。</div>
  </div>

  <!-- Schedule -->
  <div class="panel">
    <h2>Schedule</h2>
    <div id="scheduleArea"></div>
  </div>

  <!-- Tasks -->
  <div class="panel" style="flex:1;">
    <h2>Today's Tasks</h2>
    <div id="tasksArea"></div>
    <div class="add-task-row">
      <input type="text" id="newTaskInput" placeholder="タスクを追加..." onkeydown="if(event.key==='Enter')addTask()">
      <button class="btn-primary btn-sm" onclick="addTask()">+ 追加</button>
    </div>
  </div>

</div>
</div>

<script>
// ===== STATE =====
const TODAY = (() => {
  const d = new Date();
  return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
})();

const DEF = {
  streaks: { study:0, vega:0, video:0, pot:0 },
  goals: {
    vega:  { long:'', mid:'', short:'' },
    video: { long:'', mid:'', short:'' },
    pot:   { long:'', mid:'', short:'' },
  },
  dailyLog: {},
  aiReview: '',
  gistId: '', gistToken: '',
};

let S = JSON.parse(JSON.stringify(DEF));
let goalTab = { vega:'long', video:'long', pot:'long' };
let pushTimer = null;

function getToday() {
  if (!S.dailyLog[TODAY]) {
    S.dailyLog[TODAY] = {
      tasks: [
        { id:'vega',  name:'ベガ練習',  fixed:true,  done:false, comments:[] },
        { id:'video', name:'動画作業',  fixed:true,  done:false, comments:[] },
        { id:'pot',   name:'ポット作業', fixed:true, done:false, comments:[] },
      ],
      studyType: '',
    };
  }
  return S.dailyLog[TODAY];
}

// ===== PERSIST =====
function loadLocal() {
  try {
    const s = localStorage.getItem('daily-state');
    if (s) S = Object.assign(JSON.parse(JSON.stringify(DEF)), JSON.parse(s));
  } catch(e) {}
  const gid = localStorage.getItem('gist-id');
  const gtk = localStorage.getItem('gist-token');
  if (gid) S.gistId = gid;
  if (gtk) S.gistToken = gtk;
}

function saveLocal() { localStorage.setItem('daily-state', JSON.stringify(S)); }

function schedulePush() {
  clearTimeout(pushTimer);
  pushTimer = setTimeout(() => { saveLocal(); if (S.gistId) pushGist(); }, 1200);
}

// ===== GIST =====
async function pullGist() {
  const gid = S.gistId || prompt('Gist ID:');
  const tok = S.gistToken || prompt('Gist Token:');
  if (!gid || !tok) return;
  S.gistId = gid; S.gistToken = tok;
  localStorage.setItem('gist-id', gid);
  localStorage.setItem('gist-token', tok);
  setSyncStatus('syncing', '↓ 取得中...');
  try {
    const r = await fetch(`https://api.github.com/gists/${gid}`, {
      headers: { Authorization:`token ${tok}`, Accept:'application/vnd.github+json' }
    });
    if (!r.ok) throw new Error(r.status);
    const data = await r.json();
    const file = data.files['system-state.json'];
    if (file) {
      const remote = JSON.parse(file.content);
      S = Object.assign(JSON.parse(JSON.stringify(DEF)), remote);
      S.gistId = gid; S.gistToken = tok;
      saveLocal(); renderAll();
    }
    setSyncStatus('ok', '✓ 同期済み');
  } catch(e) { setSyncStatus('err', '✗ ' + e.message); }
}

async function pushGist() {
  if (!S.gistId || !S.gistToken) return;
  setSyncStatus('syncing', '↑ 保存中...');
  try {
    const r = await fetch(`https://api.github.com/gists/${S.gistId}`, {
      method: 'PATCH',
      headers: { Authorization:`token ${S.gistToken}`, Accept:'application/vnd.github+json', 'Content-Type':'application/json' },
      body: JSON.stringify({ files: { 'system-state.json': { content: JSON.stringify(S, null, 2) } } })
    });
    if (!r.ok) throw new Error(r.status);
    setSyncStatus('ok', '✓ ' + new Date().toLocaleTimeString('ja'));
  } catch(e) { setSyncStatus('err', '✗ ' + e.message); }
}

function setSyncStatus(cls, txt) {
  const el = document.getElementById('syncStatus');
  el.className = 'sync-status ' + cls;
  el.textContent = txt;
}

// ===== CLOCK =====
function tickClock() {
  const now = new Date();
  document.getElementById('headerClock').textContent = now.toLocaleTimeString('ja-JP', {hour12:false});
  const days = ['日','月','火','水','木','金','土'];
  document.getElementById('headerDate').textContent =
    `${now.getFullYear()}/${String(now.getMonth()+1).padStart(2,'0')}/${String(now.getDate()).padStart(2,'0')} (${days[now.getDay()]})`;
  highlightSlot(now.getHours());
}

// ===== STREAKS =====
function renderStreaks() {
  ['study','vega','video','pot'].forEach(k =>
    document.getElementById('st-'+k).textContent = S.streaks[k]||0);
}
function addStreak(k) { S.streaks[k]=(S.streaks[k]||0)+1; renderStreaks(); schedulePush(); }

// ===== GOALS =====
const GOAL_IDS = {
  vega:  ['gv-long','gv-mid','gv-short'],
  video: ['gvid-long','gvid-mid','gvid-short'],
  pot:   ['gp-long','gp-mid','gp-short'],
};
function renderGoals() {
  ['vega','video','pot'].forEach(g => {
    const tab = goalTab[g]||'long';
    document.getElementById('goal-'+g+'-text').textContent = (S.goals[g]&&S.goals[g][tab])||'-';
    ['long','mid','short'].forEach((t,i) => {
      const el = document.getElementById(GOAL_IDS[g][i]);
      if (el) el.value = (S.goals[g]&&S.goals[g][t])||'';
    });
  });
}
function toggleGoalEdit(g) { document.getElementById('goal-'+g+'-edit').classList.toggle('open'); }
function switchGoalTab(g, tab, el) {
  goalTab[g] = tab;
  el.closest('.goal-card').querySelectorAll('.goal-tab').forEach(t=>t.classList.remove('active'));
  el.classList.add('active');
  renderGoals();
}
function saveGoal(g) {
  if (!S.goals[g]) S.goals[g]={};
  ['long','mid','short'].forEach((t,i) => {
    const el = document.getElementById(GOAL_IDS[g][i]);
    if (el) S.goals[g][t] = el.value;
  });
  renderGoals(); schedulePush();
}

// ===== SCHEDULE =====
const SCHEDULE = [
  { time:'07:00', label:'学習',     type:'study',   color:'#7c6af7' },
  { time:'08:00', label:'ベガ練習', type:'vega',    color:'#4fc3f7' },
  { time:'09:00', label:'ベガ練習', type:'vega',    color:'#4fc3f7' },
  { time:'10:00', label:'動画作業', type:'video',   color:'#ffb74d' },
  { time:'11:00', label:'動画作業', type:'video',   color:'#ffb74d' },
  { time:'12:00', label:'昼休み',   type:'break',   color:'#555' },
  { time:'13:00', label:'ポット作業',type:'pot',    color:'#81c784' },
  { time:'14:00', label:'ポット作業',type:'pot',    color:'#81c784' },
  { time:'15:00', label:'自由/予備',type:'free',    color:'#555' },
  { time:'16:00', label:'振り返り', type:'reflect', color:'#ef9a9a' },
];
const STUDY_TYPES = [{key:'ai',label:'AI研究'},{key:'en',label:'英語'},{key:'vega2',label:'ベガ勉強'}];

function renderSchedule() {
  const today = getToday();
  const area = document.getElementById('scheduleArea');
  area.innerHTML = '';
  SCHEDULE.forEach(slot => {
    const div = document.createElement('div');
    div.className = 'time-slot';
    div.id = 'slot-' + slot.time.replace(':','');
    const chips = slot.type==='study'
      ? `<div class="study-chips">${STUDY_TYPES.map(t=>`<span class="chip ${today.studyType===t.key?'active':''}" onclick="setStudyType('${t.key}')">${t.label}</span>`).join('')}</div>`
      : '';
    div.innerHTML = `<div class="time-label">${slot.time}</div>
      <div class="time-block" style="border-left-color:${slot.color}">
        <span>${slot.label}</span>${chips}
      </div>`;
    area.appendChild(div);
  });
}
function setStudyType(key) { getToday().studyType=key; renderSchedule(); schedulePush(); }
function highlightSlot(hour) {
  document.querySelectorAll('.time-block').forEach(el=>el.classList.remove('current'));
  const slot = SCHEDULE.find(s=>parseInt(s.time)===hour);
  if (slot) {
    const el = document.getElementById('slot-'+slot.time.replace(':',''));
    if (el) el.querySelector('.time-block')?.classList.add('current');
  }
}

// ===== TASKS =====
function renderTasks() {
  const today = getToday();
  const area = document.getElementById('tasksArea');
  area.innerHTML = '';
  today.tasks.forEach((task, idx) => {
    const div = document.createElement('div');
    div.className = 'task-item';
    div.innerHTML = `
      <div class="task-header">
        <div class="task-check ${task.done?'done':''}" onclick="toggleDone(${idx})"></div>
        ${task.fixed
          ? `<div class="task-name ${task.done?'done':''}">${esc(task.name)}</div>`
          : `<input class="task-name-input" value="${esc(task.name)}" onchange="renameTask(${idx},this.value)">`
        }
        <div class="task-actions">
          <button class="btn-ghost btn-sm" onclick="toggleComments(${idx})">💬 ${(task.comments||[]).length}</button>
          ${!task.fixed ? `<button class="btn-danger btn-sm" onclick="deleteTask(${idx})">削除</button>` : ''}
        </div>
      </div>
      <div class="task-comments" id="tc-${idx}">
        <div id="comments-${idx}"></div>
        <div class="add-comment-row">
          <textarea id="newComment-${idx}" placeholder="コメントを追加..." rows="2"></textarea>
          <button class="btn-primary btn-sm" style="align-self:flex-end;height:36px" onclick="addComment(${idx})">追加</button>
        </div>
      </div>
    `;
    area.appendChild(div);
    renderComments(idx, task.comments||[]);
  });
}

function renderComments(idx, comments) {
  const container = document.getElementById('comments-'+idx);
  if (!container) return;
  container.innerHTML = '';
  comments.forEach((c, ci) => {
    const div = document.createElement('div');
    div.className = 'comment-item';
    div.id = `comment-${idx}-${ci}`;
    div.innerHTML = `
      <div class="comment-meta">${c.time||''}</div>
      <div class="comment-text" id="ct-${idx}-${ci}">${esc(c.text)}</div>
      <div class="comment-edit-area" id="cea-${idx}-${ci}">
        <textarea rows="2">${esc(c.text)}</textarea>
        <div class="comment-edit-btns">
          <button class="btn-primary btn-sm" onclick="saveCommentEdit(${idx},${ci})">保存</button>
          <button class="btn-ghost btn-sm" onclick="cancelCommentEdit(${idx},${ci})">キャンセル</button>
        </div>
      </div>
      <button class="comment-edit-btn" onclick="startCommentEdit(${idx},${ci})" title="編集">✏️</button>
      <button class="comment-del" onclick="deleteComment(${idx},${ci})" title="削除">✕</button>
    `;
    container.appendChild(div);
  });
}

function toggleDone(idx) {
  const today = getToday();
  today.tasks[idx].done = !today.tasks[idx].done;
  renderTasks(); schedulePush();
}
function toggleComments(idx) {
  const el = document.getElementById('tc-'+idx);
  el.classList.toggle('open');
}
function renameTask(idx, val) { getToday().tasks[idx].name=val; schedulePush(); }
function deleteTask(idx) { getToday().tasks.splice(idx,1); renderTasks(); schedulePush(); }
function addTask() {
  const input = document.getElementById('newTaskInput');
  const name = input.value.trim();
  if (!name) return;
  getToday().tasks.push({ id:'extra-'+Date.now(), name, fixed:false, done:false, comments:[] });
  input.value = '';
  renderTasks(); schedulePush();
}

function addComment(idx) {
  const ta = document.getElementById('newComment-'+idx);
  const text = ta.value.trim();
  if (!text) return;
  const today = getToday();
  if (!today.tasks[idx].comments) today.tasks[idx].comments=[];
  const now = new Date();
  const time = `${String(now.getHours()).padStart(2,'0')}:${String(now.getMinutes()).padStart(2,'0')}`;
  today.tasks[idx].comments.push({ text, time });
  ta.value = '';
  renderComments(idx, today.tasks[idx].comments);
  // update badge
  document.querySelector(`#tasksArea .task-item:nth-child(${idx+1}) .task-actions button`).textContent = `💬 ${today.tasks[idx].comments.length}`;
  schedulePush();
}

function deleteComment(idx, ci) {
  const today = getToday();
  today.tasks[idx].comments.splice(ci,1);
  renderComments(idx, today.tasks[idx].comments);
  schedulePush();
}

function startCommentEdit(idx, ci) {
  document.getElementById(`ct-${idx}-${ci}`).classList.add('editing');
  document.getElementById(`cea-${idx}-${ci}`).classList.add('editing');
}
function cancelCommentEdit(idx, ci) {
  document.getElementById(`ct-${idx}-${ci}`).classList.remove('editing');
  document.getElementById(`cea-${idx}-${ci}`).classList.remove('editing');
}
function saveCommentEdit(idx, ci) {
  const ta = document.querySelector(`#cea-${idx}-${ci} textarea`);
  const text = ta.value.trim();
  if (!text) return;
  getToday().tasks[idx].comments[ci].text = text;
  renderComments(idx, getToday().tasks[idx].comments);
  schedulePush();
}

// ===== AI REVIEW =====
function renderReview() {
  document.getElementById('aiReview').textContent = S.aiReview || 'まだレビューがありません。';
}

// ===== UTILS =====
function esc(s) {
  return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

// ===== RENDER ALL =====
function renderAll() {
  renderStreaks();
  renderGoals();
  renderSchedule();
  renderTasks();
  renderReview();
}

// ===== INIT =====
loadLocal();
renderAll();
setInterval(tickClock, 1000);
tickClock();
</script>
</body>
</html>
